<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #e8000d;
      --red-glow: rgba(232,0,13,0.15);
      --bg: #0e0e0e;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #222;
      --border2: #2e2e2e;
      --text: #e8e8e8;
      --muted: #484848;
      --muted2: #2a2a2a;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

    /* ── MAIN VIEW ── */
    #app { max-width: 480px; margin: 0 auto; padding: 32px 16px 100px; min-height: 100vh; display: flex; flex-direction: column; }

    .input-row { display: flex; gap: 8px; margin-bottom: 16px; }

    .task-input {
      flex: 1; background: var(--surface); border: 1.5px solid var(--border);
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
      padding: 10px 14px; border-radius: 6px; outline: none; transition: border-color 0.15s;
    }
    .task-input:focus { border-color: var(--border2); }
    .task-input::placeholder { color: var(--muted); }

    .add-btn {
      width: 40px; height: 40px; background: var(--text); color: var(--bg);
      border: none; border-radius: 6px; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; flex-shrink: 0;
    }
    .add-btn:hover { background: #bbb; }

    .urgent-row { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }

    .toggle-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

    .toggle {
      width: 36px; height: 20px; background: var(--border2); border-radius: 10px;
      position: relative; cursor: pointer; transition: background 0.2s; border: none; flex-shrink: 0;
    }
    .toggle::after {
      content: ''; width: 14px; height: 14px; background: #fff; border-radius: 50%;
      position: absolute; top: 3px; left: 3px; transition: left 0.2s;
    }
    .toggle.on { background: var(--red); }
    .toggle.on::after { left: 19px; }

    .filters { display: flex; gap: 6px; margin-bottom: 20px; }

    .pill {
      font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--muted); background: transparent;
      border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px;
      cursor: pointer; transition: all 0.15s;
    }
    .pill:hover { color: var(--text); border-color: var(--border2); }
    .pill.active { color: var(--text); border-color: var(--muted); background: var(--surface); }

    .task-list { display: flex; flex-direction: column; gap: 4px; flex: 1; }

    .task-item {
      display: flex; align-items: center; gap: 10px; padding: 12px 14px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      animation: slideIn 0.18s ease; position: relative;
    }
    @keyframes slideIn { from { opacity:0; transform: translateY(-4px); } to { opacity:1; transform: none; } }
    .task-item:hover { border-color: var(--border2); }
    .task-item.urgent { border-color: var(--red); background: rgba(232,0,13,0.03); }
    .task-item.urgent::before {
      content:''; position: absolute; left:0; top:0; bottom:0;
      width: 3px; background: var(--red); border-radius: 6px 0 0 6px;
    }
    .task-item.done { opacity: 0.35; }
    .task-item.done .task-label { text-decoration: line-through; }

    .check {
      width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border2);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; background: transparent; cursor: pointer;
    }
    .task-item.urgent:not(.done) .check { border-color: var(--red); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(232,0,13,0.5); }
      50%      { box-shadow: 0 0 0 4px rgba(232,0,13,0); }
    }
    .task-item.done .check { background: var(--muted); border-color: var(--muted); }
    .check-tick { display:none; color:#fff; font-size:10px; }
    .task-item.done .check-tick { display:block; }

    .task-label { flex: 1; font-size: 14px; line-height: 1.4; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-item.urgent:not(.done) .task-label { font-weight: 500; }

    .task-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }

    .due-tag { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
    .due-tag.overdue { color: var(--red); }
    .due-tag.soon { color: #f5a623; }

    .notes-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); }
    .task-item.urgent .notes-dot { background: var(--red); }

    .del-btn {
      opacity: 0; background: transparent; border: none; color: var(--muted);
      cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 3px;
      transition: opacity 0.15s, color 0.15s; flex-shrink: 0;
    }
    .task-item:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: var(--red); }

    .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 60px 0; }

    /* footer */
    .footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 18px; display: flex; justify-content: center;
    }
    .secret-link {
      font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted2);
      letter-spacing: 1px; text-transform: uppercase; background: transparent;
      border: none; cursor: pointer; transition: color 0.2s;
    }
    .secret-link:hover { color: var(--muted); }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      z-index: 100; align-items: center; justify-content: center; padding: 16px;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface); border: 1px solid var(--border2); border-radius: 10px;
      width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto;
      padding: 24px; animation: mIn 0.18s ease;
    }
    @keyframes mIn { from { opacity:0; transform: scale(0.96); } to { opacity:1; transform: none; } }

    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .modal-title { font-size: 15px; font-weight: 500; line-height: 1.3; flex: 1; margin-right: 12px; }
    .modal-close {
      background: transparent; border: none; color: var(--muted);
      font-size: 18px; cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text); }

    .modal-field { margin-bottom: 16px; }
    .field-label { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; display: block; }

    .field-input, .field-textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
      padding: 10px 12px; border-radius: 6px; outline: none; transition: border-color 0.15s;
    }
    .field-input:focus, .field-textarea:focus { border-color: var(--border2); }
    .field-textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
    .field-input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.4); cursor: pointer; }

    .urgent-check-row { display: flex; align-items: center; gap: 10px; }

    .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
    .btn-save {
      flex: 1; background: var(--text); color: var(--bg); border: none;
      border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 14px;
      font-weight: 500; padding: 10px; cursor: pointer; transition: background 0.15s;
    }
    .btn-save:hover { background: #bbb; }
    .btn-secondary {
      background: transparent; color: var(--muted); border: 1px solid var(--border);
      border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 14px;
      padding: 10px 16px; cursor: pointer; transition: all 0.15s;
    }
    .btn-secondary:hover { border-color: var(--border2); color: var(--text); }

    /* ── CALENDAR ── */
    #calView { display: none; max-width: 480px; margin: 0 auto; padding: 32px 16px 80px; min-height: 100vh; }
    #calView.open { display: block; }

    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .cal-nav { display: flex; align-items: center; gap: 14px; }
    .cal-month { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--text); min-width: 140px; text-align: center; }
    .nav-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 4px; width: 28px; height: 28px; cursor: pointer; font-size: 14px;
      transition: all 0.15s; display: flex; align-items: center; justify-content: center;
    }
    .nav-btn:hover { border-color: var(--border2); color: var(--text); }
    .back-link {
      font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px;
      text-transform: uppercase; color: var(--muted2); background: transparent;
      border: none; cursor: pointer; transition: color 0.15s;
    }
    .back-link:hover { color: var(--muted); }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }

    .cal-day-name { font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); text-align: center; padding: 6px 0; }

    .cal-day {
      aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; border-radius: 6px; cursor: pointer;
      border: 1px solid transparent; transition: all 0.12s;
      padding: 4px; gap: 3px; background: transparent;
    }
    .cal-day:hover { background: var(--surface); border-color: var(--border); }
    .cal-day.empty { cursor: default; pointer-events: none; }
    .cal-day.today { border-color: var(--red); }
    .cal-day.today .day-num { color: var(--red); font-weight: 600; }
    .cal-day.has-tasks { background: var(--surface); }
    .cal-day.selected { border-color: var(--border2) !important; background: var(--surface2) !important; }

    .day-num { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text); line-height: 1; }
    .cal-day.faded .day-num { color: var(--muted2); }

    .day-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; min-height: 5px; }
    .day-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--muted); }
    .day-dot.urgent { background: var(--red); }

    .cal-day-detail { margin-top: 18px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
    .cal-day-detail-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

    .cal-task-row {
      display: flex; align-items: center; gap: 8px; padding: 8px 0;
      border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.15s;
    }
    .cal-task-row:last-of-type { border-bottom: none; }
    .cal-task-row:hover { opacity: 0.7; }

    .cal-task-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .cal-task-dot.urgent { background: var(--red); }
    .cal-task-name { flex: 1; font-size: 13px; }

    .cal-empty { font-size: 13px; color: var(--muted); text-align: center; padding: 10px 0; }

    .cal-add-btn {
      width: 100%; margin-top: 10px; background: transparent; border: 1px dashed var(--border);
      color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px;
      padding: 8px; border-radius: 6px; cursor: pointer; transition: all 0.15s;
    }
    .cal-add-btn:hover { border-color: var(--border2); color: var(--text); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  </style>
</head>
<body>

<!-- MAIN -->
<div id="app">
  <div class="input-row">
    <input class="task-input" id="taskInput" type="text" placeholder="add a task..." maxlength="200" autocomplete="off" />
    <button class="add-btn" id="addBtn">+</button>
  </div>

  <div class="urgent-row">
    <button class="toggle" id="urgentToggle"></button>
    <span class="toggle-label" id="urgentLabel">urgent</span>
  </div>

  <div class="filters">
    <button class="pill active" data-f="all">all</button>
    <button class="pill" data-f="urgent">urgent</button>
    <button class="pill" data-f="done">done</button>
  </div>

  <div class="task-list" id="taskList"></div>
</div>

<!-- CALENDAR -->
<div id="calView">
  <div class="cal-header">
    <button class="back-link" id="backBtn">← back</button>
    <div class="cal-nav">
      <button class="nav-btn" id="prevMonth">‹</button>
      <div class="cal-month" id="calMonth"></div>
      <button class="nav-btn" id="nextMonth">›</button>
    </div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div id="calDayDetail"></div>
</div>

<!-- FOOTER -->
<div class="footer" id="mainFooter">
  <button class="secret-link" id="calBtn">calendar</button>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-field">
      <label class="field-label" for="editText">task</label>
      <input class="field-input" id="editText" type="text" maxlength="200" />
    </div>
    <div class="modal-field">
      <label class="field-label" for="editNotes">notes</label>
      <textarea class="field-textarea" id="editNotes" placeholder="anything you want to remember..."></textarea>
    </div>
    <div class="modal-field">
      <label class="field-label" for="editDue">due date</label>
      <input class="field-input" id="editDue" type="date" />
    </div>
    <div class="modal-field">
      <div class="urgent-check-row">
        <button class="toggle" id="editUrgent"></button>
        <span class="field-label" style="margin-bottom:0">urgent</span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="modalDelete">delete</button>
      <button class="btn-save" id="modalSave">save</button>
    </div>
  </div>
</div>

<script>
  let tasks = [];
  let filter = 'all';
  let urgentNew = false;
  let editingId = null;
  let editUrgentVal = false;
  let calDate = new Date();
  let selectedCalDay = null;

  const load = () => { try { tasks = JSON.parse(localStorage.getItem('doit_v2') || '[]'); } catch { tasks = []; } };
  const save = () => localStorage.setItem('doit_v2', JSON.stringify(tasks));
  const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
  const today = () => new Date().toISOString().slice(0,10);

  function dueMeta(due) {
    if (!due) return null;
    const d = new Date(due + 'T00:00:00');
    const t = new Date(); t.setHours(0,0,0,0);
    const diff = Math.round((d - t) / 86400000);
    if (diff < 0)  return { label: `${Math.abs(diff)}d ago`, cls: 'overdue' };
    if (diff === 0) return { label: 'today', cls: 'soon' };
    if (diff === 1) return { label: 'tmrw', cls: 'soon' };
    return { label: due.slice(5).replace('-','/'), cls: '' };
  }

  // ── Render tasks ──
  function renderTasks() {
    const list = document.getElementById('taskList');
    list.innerHTML = '';

    let shown = tasks.filter(t => {
      if (filter === 'urgent') return t.urgent && !t.done;
      if (filter === 'done')   return t.done;
      return true;
    });

    shown.sort((a,b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      if (a.urgent !== b.urgent) return a.urgent ? -1 : 1;
      if (a.due && b.due) return a.due.localeCompare(b.due);
      if (a.due) return -1; if (b.due) return 1;
      return b.created - a.created;
    });

    if (!shown.length) {
      list.innerHTML = '<div class="empty">nothing here</div>';
      return;
    }

    shown.forEach(t => {
      const div = document.createElement('div');
      div.className = `task-item${t.urgent ? ' urgent' : ''}${t.done ? ' done' : ''}`;

      const chk = document.createElement('button');
      chk.className = 'check';
      chk.innerHTML = '<span class="check-tick">✓</span>';
      chk.addEventListener('click', e => { e.stopPropagation(); toggleDone(t.id); });

      const lbl = document.createElement('span');
      lbl.className = 'task-label';
      lbl.textContent = t.text;

      const meta = document.createElement('div');
      meta.className = 'task-meta';

      const dm = dueMeta(t.due);
      if (dm) {
        const tag = document.createElement('span');
        tag.className = `due-tag ${dm.cls}`;
        tag.textContent = dm.label;
        meta.appendChild(tag);
      }

      if (t.notes && t.notes.trim()) {
        const dot = document.createElement('div');
        dot.className = 'notes-dot';
        meta.appendChild(dot);
      }

      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '×';
      del.addEventListener('click', e => { e.stopPropagation(); deleteTask(t.id); });

      div.appendChild(chk);
      div.appendChild(lbl);
      div.appendChild(meta);
      div.appendChild(del);
      div.addEventListener('click', () => openModal(t.id));
      list.appendChild(div);
    });
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) return;
    tasks.unshift({ id: uid(), text, notes: '', due: '', urgent: urgentNew, done: false, created: Date.now() });
    input.value = '';
    save(); renderTasks();
  }

  function toggleDone(id) {
    const t = tasks.find(x => x.id === id);
    if (t) { t.done = !t.done; save(); renderTasks(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(x => x.id !== id);
    save(); renderTasks();
    if (document.getElementById('calView').classList.contains('open')) renderCal();
  }

  // urgent toggle (new task)
  function syncToggle() {
    const tog = document.getElementById('urgentToggle');
    const lbl = document.getElementById('urgentLabel');
    tog.classList.toggle('on', urgentNew);
    lbl.style.color = urgentNew ? 'var(--red)' : '';
  }
  document.getElementById('urgentToggle').addEventListener('click', () => { urgentNew = !urgentNew; syncToggle(); });

  // filters
  document.querySelectorAll('.pill').forEach(p => {
    p.addEventListener('click', () => {
      filter = p.dataset.f;
      document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      renderTasks();
    });
  });

  document.getElementById('addBtn').addEventListener('click', addTask);
  document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  // ── MODAL ──
  function openModal(id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    editingId = id;
    editUrgentVal = t.urgent;
    document.getElementById('modalTitle').textContent = t.text;
    document.getElementById('editText').value = t.text;
    document.getElementById('editNotes').value = t.notes || '';
    document.getElementById('editDue').value = t.due || '';
    document.getElementById('editUrgent').classList.toggle('on', t.urgent);
    document.getElementById('taskModal').classList.add('open');
  }

  function openModalForDate(dateStr) {
    editingId = null;
    editUrgentVal = false;
    document.getElementById('modalTitle').textContent = 'new task';
    document.getElementById('editText').value = '';
    document.getElementById('editNotes').value = '';
    document.getElementById('editDue').value = dateStr;
    document.getElementById('editUrgent').classList.remove('on');
    document.getElementById('taskModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('taskModal').classList.remove('open');
    editingId = null;
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('taskModal').addEventListener('click', e => {
    if (e.target === document.getElementById('taskModal')) closeModal();
  });

  document.getElementById('editUrgent').addEventListener('click', () => {
    editUrgentVal = !editUrgentVal;
    document.getElementById('editUrgent').classList.toggle('on', editUrgentVal);
  });

  document.getElementById('modalSave').addEventListener('click', () => {
    const text = document.getElementById('editText').value.trim();
    if (!text) return;
    const notes = document.getElementById('editNotes').value.trim();
    const due   = document.getElementById('editDue').value;

    if (editingId) {
      const t = tasks.find(x => x.id === editingId);
      if (t) { t.text = text; t.notes = notes; t.due = due; t.urgent = editUrgentVal; }
    } else {
      tasks.unshift({ id: uid(), text, notes, due, urgent: editUrgentVal, done: false, created: Date.now() });
    }

    save(); closeModal(); renderTasks();
    if (document.getElementById('calView').classList.contains('open')) renderCal();
  });

  document.getElementById('modalDelete').addEventListener('click', () => {
    if (editingId) deleteTask(editingId);
    closeModal();
  });

  // ── CALENDAR ──
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS   = ['S','M','T','W','T','F','S'];

  function showCal() {
    document.getElementById('app').style.display = 'none';
    document.getElementById('mainFooter').style.display = 'none';
    document.getElementById('calView').classList.add('open');
    renderCal();
  }

  function hideCal() {
    document.getElementById('app').style.display = '';
    document.getElementById('mainFooter').style.display = '';
    document.getElementById('calView').classList.remove('open');
    renderTasks();
  }

  function renderCal() {
    const y = calDate.getFullYear(), m = calDate.getMonth();
    document.getElementById('calMonth').textContent = `${MONTHS[m]} ${y}`;

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    DAYS.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-day-name';
      el.textContent = d;
      grid.appendChild(el);
    });

    const firstDay = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const todayStr = today();

    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day empty';
      grid.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayTasks = tasks.filter(t => t.due === dateStr && !t.done);

      const el = document.createElement('div');
      el.className = `cal-day${dateStr === todayStr ? ' today' : ''}${dayTasks.length ? ' has-tasks' : ''}${selectedCalDay === dateStr ? ' selected' : ''}`;

      const num = document.createElement('div');
      num.className = 'day-num';
      num.textContent = d;

      const dots = document.createElement('div');
      dots.className = 'day-dots';
      dayTasks.slice(0, 4).forEach(t => {
        const dot = document.createElement('div');
        dot.className = `day-dot${t.urgent ? ' urgent' : ''}`;
        dots.appendChild(dot);
      });

      el.appendChild(num);
      el.appendChild(dots);
      el.addEventListener('click', () => { selectedCalDay = dateStr; renderCal(); renderDayDetail(dateStr); });
      grid.appendChild(el);
    }

    if (selectedCalDay) renderDayDetail(selectedCalDay);
    else document.getElementById('calDayDetail').innerHTML = '';
  }

  function renderDayDetail(dateStr) {
    const detail = document.getElementById('calDayDetail');
    const dayTasks = tasks.filter(t => t.due === dateStr);
    const d = new Date(dateStr + 'T00:00:00');
    const label = d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

    detail.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'cal-day-detail';

    const title = document.createElement('div');
    title.className = 'cal-day-detail-title';
    title.textContent = label;
    wrap.appendChild(title);

    if (!dayTasks.length) {
      const emp = document.createElement('div');
      emp.className = 'cal-empty';
      emp.textContent = 'nothing scheduled';
      wrap.appendChild(emp);
    } else {
      dayTasks.forEach(t => {
        const row = document.createElement('div');
        row.className = 'cal-task-row';

        const dot = document.createElement('div');
        dot.className = `cal-task-dot${t.urgent ? ' urgent' : ''}`;

        const name = document.createElement('div');
        name.className = 'cal-task-name';
        name.textContent = t.text;
        if (t.done) { name.style.textDecoration = 'line-through'; name.style.opacity = '0.4'; }

        row.appendChild(dot);
        row.appendChild(name);
        row.addEventListener('click', () => openModal(t.id));
        wrap.appendChild(row);
      });
    }

    const addBtn = document.createElement('button');
    addBtn.className = 'cal-add-btn';
    addBtn.textContent = '+ add task for this day';
    addBtn.addEventListener('click', () => openModalForDate(dateStr));
    wrap.appendChild(addBtn);

    detail.appendChild(wrap);
  }

  document.getElementById('calBtn').addEventListener('click', showCal);
  document.getElementById('backBtn').addEventListener('click', hideCal);
  document.getElementById('prevMonth').addEventListener('click', () => { calDate.setMonth(calDate.getMonth()-1); selectedCalDay = null; renderCal(); });
  document.getElementById('nextMonth').addEventListener('click', () => { calDate.setMonth(calDate.getMonth()+1); selectedCalDay = null; renderCal(); });

  // ── Init ──
  load();
  renderTasks();
</script>
</body>
</html>
